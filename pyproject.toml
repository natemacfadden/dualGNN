[build-system]
requires = ["setuptools>=61", "cython"]
build-backend = "setuptools.build_meta"

[project]
name = "dualgnn"
version = "0.0.6"
description = "Dual-graph GNN sampler for fine regular triangulations of 2D lattice polygons"
readme = "README.md"
authors = [{ name = "Nate MacFadden" }]
license = "GPL-3.0-or-later"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "scipy",
    "numba",
    "torch>=2.7",
    "regfans",
    "highspy",    # NTFE pipeline's LP solver
]

[project.urls]
Homepage        = "https://github.com/natemacfadden/dualGNN"
Repository      = "https://github.com/natemacfadden/dualGNN"
Paper           = "https://arxiv.org/abs/2605.27770"
"Model weights" = "https://huggingface.co/natemacfadden/dualGNN"
Archive         = "https://doi.org/10.5281/zenodo.20622920"

[project.optional-dependencies]
# tests/ need pytest; the package itself suffices for inference
test = ["pytest"]
# plotting for the tutorials and the GUI (scripts/visualize.py)
viz = ["matplotlib"]
# Training additionally needs CYTools + its native libraries (ppl, normaliz,
# python-flint), none of which are pip-installable, plus polars for the data
# layer. Use the conda environment:
#     conda env create -f environment.yml
# The sentinel below makes `pip install .[train]` fail loudly at resolve time
# rather than leave someone with a half-working (CYTools-less) setup.
train = ["dualgnn-training-is-conda-only-see-environment-yml"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
# shipped model checkpoints (DualGNN.default() loads reinforce.pt)
dualgnn = ["ckpts/*.pt"]

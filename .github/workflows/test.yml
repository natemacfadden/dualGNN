name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python: "3.10" }
          - { os: ubuntu-latest, python: "3.13" }
          - { os: macos-latest,  python: "3.13" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      # CPU torch first: the default Linux wheel bundles CUDA (multi-GB)
      - name: Install CPU torch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Install package
        run: pip install -e .[test]
      # NTFE tests need CYTools; they run in the dedicated `ntfe` job below so
      # the core matrix stays light and free of the CYTools/highspy stack.
      - name: Run tests
        run: pytest tests/ --ignore=tests/test_ntfe.py -q

  ntfe:
    name: pytest NTFE (ubuntu, py3.13, CYTools)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install CPU torch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      # .[train] pulls CYTools (+ polars, tensorboard); .[test] adds pytest
      - name: Install package + training/NTFE stack
        run: pip install -e .[test,train]
      - name: Run NTFE tests
        run: pytest tests/test_ntfe.py -q

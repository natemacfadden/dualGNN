name: Check Version

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  citation-version:
    name: CITATION.cff version gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check CITATION.cff version matches pyproject.toml
        run: |
          PYPROJECT_V=$(grep -m1 -E '^version *= *' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          CFF_V=$(grep -m1 -E '^version: *' CITATION.cff | sed -E 's/^version: *"?([^"[:space:]]+).*/\1/')
          echo "pyproject=$PYPROJECT_V  CITATION.cff=$CFF_V"
          if [ "$PYPROJECT_V" != "$CFF_V" ]; then
            echo "::error::Version drift: pyproject=$PYPROJECT_V vs CITATION.cff=$CFF_V"
            exit 1
          fi

  model-card-drift:
    name: HF model card drift gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check docs/hf_model_card.md matches the Hugging Face hub card
        run: |
          curl -sSfL --retry 3 --retry-delay 5 \
            https://huggingface.co/natemacfadden/dualGNN/raw/main/README.md \
            -o /tmp/hub_card.md
          # strict content match; CRs and trailing-newline differences normalized
          # (the HF web editor saves without a final newline)
          if ! diff -u <(printf '%s\n' "$(sed -e 's/\r$//' docs/hf_model_card.md)") \
                       <(printf '%s\n' "$(sed -e 's/\r$//' /tmp/hub_card.md)"); then
            echo "::error::docs/hf_model_card.md has drifted from the HF hub card -- sync one to the other"
            exit 1
          fi

[build-system]
requires = ["setuptools>=61", "cython"]
build-backend = "setuptools.build_meta"

[project]
name = "dualgnn"
version = "0.1.0"
description = "Dual-graph GNN sampler for fine regular triangulations of 2D lattice polygons"
authors = [{ name = "Nate MacFadden" }]
license = "GPL-3.0-or-later"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "scipy",
    "numba",
    "polars",
    "torch>=2.7",
    "matplotlib",
    "cytools",
    "regfans",
]

[project.optional-dependencies]
train = ["tensorboard"]
test = ["pytest"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
